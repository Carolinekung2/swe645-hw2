# service.yaml
# Authors: Caroline Kung, Cynthia Kirupakaran
# Course: SWE645 - Software Engineering for the Web
# Purpose: Kubernetes Service manifest for the SWE645 web application.
#          Exposes the deployment externally via NodePort so the app is accessible
#          from outside the cluster at <NodeIP>:30080.

apiVersion: v1
kind: Service
metadata:
  name: swe645-service
  labels:
    app: swe645-webapp
spec:
  type: NodePort
  selector:
    app: swe645-webapp          # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80                  # Port exposed inside the cluster
      targetPort: 80            # Port the container listens on
      nodePort: 30080           # External port (valid range: 30000–32767)
